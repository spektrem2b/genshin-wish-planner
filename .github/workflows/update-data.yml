name: Update Genshin data

on:
  schedule:
    # Every 3 days at 04:17 UTC. Off-the-hour on purpose to avoid piling
    # onto everyone else's :00 cron jobs. Only pulls the full character
    # and weapon lists from Project Ambr, and new content doesn't land
    # more than roughly every 6 weeks, so this is plenty responsive.
    - cron: "17 4 */3 * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data sync
        run: python scripts/update_data.py

      - name: Commit changes if any
        run: |
          git config user.name "genshin-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add assets/data/characters.js assets/data/weapons.js
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: sync characters/weapons from Project Ambr"
            git push
          fi
