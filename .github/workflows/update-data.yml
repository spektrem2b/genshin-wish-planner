name: Update Genshin data

on:
  schedule:
    # Daily, off-the-hour on purpose to avoid piling onto everyone
    # else's :00 cron jobs. Cheap most days: update_data.py checks
    # Ambr's own data version first and skips the whole pipeline
    # (including the per-character detail pull) unless it actually
    # changed since last run.
    - cron: "43 3 * * *"
  workflow_dispatch: {}   # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data sync
        run: python scripts/update_data.py

      - name: Commit changes if any
        run: |
          git config user.name "genshin-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add assets/data/characters.js assets/data/weapons.js assets/data/character-profiles/ scripts/.ambr-version
          if git diff --cached --quiet; then
            echo "No data changes, skipping commit."
          else
            git commit -m "chore: sync characters/weapons/profiles from Project Ambr"
            git push
          fi
