name: Cache-bust static assets

# Runs on every push to main that touches the page itself, and stamps a
# fresh ?v=... onto every local <script>/<link> tag in index.html so
# browsers (looking at you, Brave) can't keep serving a stale cached
# tab-build.js/app.js/styles.css after a deploy.
on:
  push:
    branches: [main]
    paths:
      - "index.html"
      - "css/**"
      - "js/**"
      - "assets/data/**"

permissions:
  contents: write

jobs:
  cache-bust:
    runs-on: ubuntu-latest
    # Guard against an infinite loop: skip if this push IS the bot's own
    # cache-bust commit.
    if: "!contains(github.event.head_commit.message, '[cache-bust]')"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Stamp build id into index.html
        run: |
          BUILD_ID=$(git rev-parse --short HEAD)
          # Matches ?v=<anything up to the closing quote> right after
          # css/... or js/... or assets/data/... references, and replaces
          # it with the current commit's short SHA. Works whether the
          # existing value is the __BUILD_ID__ placeholder or a previous
          # commit SHA from an earlier run.
          sed -i -E "s/((css|js|assets\/data)\/[^\"']*\?v=)[^\"']*/\1${BUILD_ID}/g" index.html
          echo "Stamped build id: ${BUILD_ID}"

      - name: Commit if changed
        run: |
          git config user.name "genshin-data-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          if git diff --cached --quiet; then
            echo "No change, skipping commit."
          else
            git commit -m "chore: bump cache-busting build id [cache-bust]"
            git push
          fi
